syntax = "proto3";

option go_package = "gophermart_protos/commands/withdraw";

service WithdrawService {
  rpc DoWithdraw(WithdrawParams) returns (WithdrawResponse);
}

message WithdrawParams {
  int64 amount        = 1;
  int64 account_id    = 2;
  string order_number = 3;
}

message WithdrawResponse {}